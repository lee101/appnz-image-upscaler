<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Open image upscaler</title><style>:root{color-scheme:dark;font:16px/1.5 system-ui;background:#070707;color:#fff}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 85% 10%,#32284d,transparent 42%)}main{width:min(760px,100%);padding:clamp(25px,6vw,58px);border:1px solid #ffffff20;border-radius:24px;background:#0d0d0de8}b{color:#bd9bff;text-transform:uppercase;letter-spacing:.15em;font-size:.75rem}h1{font-size:clamp(2.4rem,8vw,5.2rem);line-height:.94;margin:.35em 0}p{color:#aaa}label{display:block;margin:15px 0 0;font-size:.82rem;font-weight:700}input,select,button{width:100%;margin-top:6px;padding:14px;border:1px solid #ffffff24;border-radius:12px;background:#050505;color:white}button{margin-top:20px;background:#bd9bff;color:#160b27;font-weight:900}</style></head><body><main><b>Real-ESRGAN + GFPGAN</b><h1>Make the small details big.</h1><p>Deploy the open Cog, enter its model id, and run 2× or 4× restoration from this dedicated app.nz subdomain.</p><label>Cog model id<input id="id"></label><label>Image<input id="file" type="file" accept="image/*"></label><label>Scale<select id="scale"><option>4</option><option>2</option></select></label><label><input id="face" type="checkbox" style="width:auto"> Enhance faces</label><button id="run">Upscale image</button><p id="status">Ready.</p><script>const $=x=>document.getElementById(x);$('run').onclick=async()=>{const f=$('file').files[0],id=$('id').value.trim();if(!f||!id)return $('status').textContent='Add a model id and image.';const image=await new Promise(r=>{const q=new FileReader;q.onload=()=>r(q.result);q.readAsDataURL(f)});$('status').textContent='Queued…';const r=await fetch(`https://app.nz/api/cogs/${encodeURIComponent(id)}/predict`,{method:'POST',credentials:'include',headers:{'content-type':'application/json'},body:JSON.stringify({input:{image,scale:Number($('scale').value),model:'general',face_enhance:$('face').checked}})});const b=await r.json();$('status').textContent=r.ok?'Open Cog Studio to follow the prediction.':(b.error||'Request failed')};</script></main></body></html>
